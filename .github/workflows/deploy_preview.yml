name: Deploy to Preview

on:
  push:
    branches:
      - develop

jobs:
  sync-preview:
    runs-on: ubuntu-latest
    if: github.repository == 'veecode-platform/docs'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH deploy key
        env:
          DEPLOY_KEY: ${{ secrets.PREVIEW_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to preview repo
        run: |
          git remote add preview git@github.com:veecode-platform/docs-next.git
          git push preview develop:main --force
