name: Publish @veecode/docs-mcp

on:
  push:
    branches: [main]
    paths:
      - mcp-server/**
      - plugins/mcp-snapshot/**
      - schemas/**
      - devportal/**
      - platform/**
      - admin-ui/**
      - vkdr/**

concurrency:
  group: publish-mcp
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'veecode-platform/docs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # OIDC for npm trusted publishing (provenance)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Enable Corepack
        run: corepack enable
      - name: Install
        run: yarn install --immutable
      - name: Build site (generates snapshot)
        run: yarn build
      - name: Copy snapshot into mcp-server/bundled/
        run: |
          mkdir -p mcp-server/bundled
          cp build/mcp-snapshot.json mcp-server/bundled/snapshot.json
      - name: Build MCP server
        run: yarn mcp:build
      - name: MCP CI (typecheck + lint + test)
        run: yarn mcp:ci
      - name: Determine version bump
        id: bump
        run: |
          base="${{ github.event.before }}"
          head="${{ github.event.after }}"
          # Guard against zero-SHA before (new branch); fall back to HEAD~1
          if [ "$base" = "0000000000000000000000000000000000000000" ] || [ -z "$base" ]; then
            base="HEAD~1"
          fi
          changed=$(git diff --name-only "$base" "$head")
          if echo "$changed" | grep -q '^mcp-server/src/'; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi
      - name: Bump version
        run: |
          cd mcp-server
          yarn version ${{ steps.bump.outputs.level }}
      - name: Publish (OIDC trusted publisher + provenance)
        run: |
          cd mcp-server
          npm publish --provenance --access public
      - name: Commit version bump
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add mcp-server/package.json
          git commit -m "chore(release): @veecode/docs-mcp $(node -p "require('./mcp-server/package.json').version")"
          # Avoid non-FF on race with unrelated main pushes
          git pull --rebase origin main
          git push
