name: Publish @veecode/docs-mcp

on:
  push:
    branches: [main]
    paths:
      - mcp-server/**
      - plugins/mcp-snapshot/**
      - schemas/**
      - devportal/**
      - platform/**
      - admin-ui/**
      - vkdr/**

concurrency:
  group: publish-mcp
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Enable Corepack
        run: corepack enable
      - name: Install
        run: yarn install --immutable
      - name: Build site (generates snapshot)
        run: yarn build
      - name: Copy snapshot into mcp-server/bundled/
        run: |
          mkdir -p mcp-server/bundled
          cp build/mcp-snapshot.json mcp-server/bundled/snapshot.json
      - name: MCP CI (typecheck + lint + test)
        run: yarn mcp:ci
      - name: Build MCP server
        run: yarn mcp:build
      - name: Determine version bump
        id: bump
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          if echo "$changed" | grep -q '^mcp-server/src/'; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi
      - name: Bump version
        run: |
          cd mcp-server
          yarn version ${{ steps.bump.outputs.level }}
      - name: Publish
        run: yarn workspace @veecode/docs-mcp npm publish --access public
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Commit version bump
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add mcp-server/package.json
          git commit -m "chore(release): @veecode/docs-mcp $(node -p "require('./mcp-server/package.json').version")"
          git push
